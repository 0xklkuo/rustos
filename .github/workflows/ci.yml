name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain with UEFI target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-uefi

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run xtask fmt
        run: cargo run -p xtask -- fmt

  lint:
    name: Clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain with UEFI target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-uefi

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run xtask lint
        run: cargo run -p xtask -- lint

  unit-test:
    name: Unit and build checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain with UEFI target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-uefi

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run xtask test-unit
        run: cargo run -p xtask -- test-unit

  qemu-test:
    name: QEMU smoke test
    runs-on: ubuntu-latest
    needs:
      - fmt
      - lint
      - unit-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain with UEFI target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-uefi

      - name: Install QEMU and OVMF
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 ovmf

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run xtask test-qemu
        env:
          RUSTOS_UEFI_CODE: /usr/share/OVMF/OVMF_CODE.fd
          RUSTOS_UEFI_VARS: /usr/share/OVMF/OVMF_VARS.fd
          RUSTOS_QEMU_TIMEOUT_SECS: "20"
        run: cargo run -p xtask -- test-qemu

  exception-test:
    name: Exception smoke test
    runs-on: ubuntu-latest
    needs:
      - fmt
      - lint
      - unit-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain with UEFI target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-uefi

      - name: Install QEMU and OVMF
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 ovmf

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run xtask test-exception
        env:
          RUSTOS_UEFI_CODE: /usr/share/OVMF/OVMF_CODE.fd
          RUSTOS_UEFI_VARS: /usr/share/OVMF/OVMF_VARS.fd
          RUSTOS_QEMU_TIMEOUT_SECS: "20"
        run: cargo run -p xtask -- test-exception
